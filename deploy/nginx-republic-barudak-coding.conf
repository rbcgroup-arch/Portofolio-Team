server {
    listen 80;
    listen [::]:80;

    server_name 103.197.189.114;

    root /var/www/republic-barudak-coding;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
}
